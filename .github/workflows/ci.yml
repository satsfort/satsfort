name: CI

on:
    push:
    pull_request:

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: false

jobs:
    check:
        name: Lint, format, test
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Setup Rust
              uses: dtolnay/rust-toolchain@stable

            - name: Cache Rust build
              uses: Swatinem/rust-cache@v2
              with:
                  workspaces: src-tauri

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: Install Linux system dependencies
              run: |
                  sudo apt-get update
                  WEBKIT_PKG="libwebkit2gtk-4.1-dev"
                  if ! apt-cache show "$WEBKIT_PKG" >/dev/null 2>&1; then
                      WEBKIT_PKG="libwebkit2gtk-4.0-dev"
                  fi

                  APPINDICATOR_PKG="libayatana-appindicator3-dev"
                  if ! apt-cache show "$APPINDICATOR_PKG" >/dev/null 2>&1; then
                      APPINDICATOR_PKG="libappindicator3-dev"
                  fi

                  sudo apt-get install -y \
                      pkg-config \
                      libglib2.0-dev \
                      libgtk-3-dev \
                      "$WEBKIT_PKG" \
                      "$APPINDICATOR_PKG" \
                      librsvg2-dev \
                      patchelf

            - name: Install dependencies
              run: npm ci

            - name: Prettier check
              run: npm run format:check

            - name: Lint
              run: npm run lint

            - name: Test
              run: npm test

            - name: Rust tests
              run: cargo test --manifest-path src-tauri/Cargo.toml

    e2e:
        name: End-to-end (Tauri + tauri-driver)
        runs-on: ubuntu-latest
        needs: check

        steps:
            - uses: actions/checkout@v4

            - name: Setup Rust
              uses: dtolnay/rust-toolchain@stable

            - name: Cache Rust build
              uses: Swatinem/rust-cache@v2
              with:
                  workspaces: src-tauri

            - name: Cache tauri-driver binary
              id: tauri-driver-cache
              uses: actions/cache@v4
              with:
                  path: ~/.cargo/bin/tauri-driver
                  key: tauri-driver-v1-${{ runner.os }}

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: Install Linux system dependencies
              run: |
                  sudo apt-get update
                  WEBKIT_PKG="libwebkit2gtk-4.1-dev"
                  if ! apt-cache show "$WEBKIT_PKG" >/dev/null 2>&1; then
                      WEBKIT_PKG="libwebkit2gtk-4.0-dev"
                  fi

                  APPINDICATOR_PKG="libayatana-appindicator3-dev"
                  if ! apt-cache show "$APPINDICATOR_PKG" >/dev/null 2>&1; then
                      APPINDICATOR_PKG="libappindicator3-dev"
                  fi

                  sudo apt-get install -y \
                      pkg-config \
                      libglib2.0-dev \
                      libgtk-3-dev \
                      "$WEBKIT_PKG" \
                      "$APPINDICATOR_PKG" \
                      librsvg2-dev \
                      patchelf \
                      webkit2gtk-driver \
                      xvfb

            - name: Install tauri-driver
              if: steps.tauri-driver-cache.outputs.cache-hit != 'true'
              run: cargo install tauri-driver --locked

            - name: Install npm dependencies
              run: npm ci

            - name: Build frontend + Tauri debug binary
              run: npm run test:e2e:build

            - name: Run WebdriverIO e2e tests
              run: xvfb-run --auto-servernum npx wdio run ./wdio.conf.ts

            - name: Upload wdio logs on failure
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: wdio-logs
                  path: |
                      logs/
                      wdio.log
                  if-no-files-found: ignore
