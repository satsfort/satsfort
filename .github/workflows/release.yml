name: Release

on:
    push:
        tags:
            - "v*"
    workflow_dispatch:

permissions:
    contents: write

jobs:
    build:
        name: Build installers (${{ matrix.name }})
        strategy:
            fail-fast: false
            matrix:
                include:
                    - name: macOS (universal)
                      platform: macos-latest
                      rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
                      args: --target universal-apple-darwin
                    - name: Linux (x86_64)
                      platform: ubuntu-latest
                      rust-targets: ""
                      args: ""
                    - name: Windows (x86_64)
                      platform: windows-latest
                      rust-targets: ""
                      args: ""
        runs-on: ${{ matrix.platform }}

        steps:
            - uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: Setup Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.rust-targets }}

            - name: Cache Rust build
              uses: Swatinem/rust-cache@v2
              with:
                  workspaces: src-tauri

            - name: Install Linux system dependencies
              if: matrix.platform == 'ubuntu-latest'
              run: |
                  sudo apt-get update
                  WEBKIT_PKG="libwebkit2gtk-4.1-dev"
                  if ! apt-cache show "$WEBKIT_PKG" >/dev/null 2>&1; then
                      WEBKIT_PKG="libwebkit2gtk-4.0-dev"
                  fi

                  APPINDICATOR_PKG="libayatana-appindicator3-dev"
                  if ! apt-cache show "$APPINDICATOR_PKG" >/dev/null 2>&1; then
                      APPINDICATOR_PKG="libappindicator3-dev"
                  fi

                  sudo apt-get install -y \
                      pkg-config \
                      libglib2.0-dev \
                      libgtk-3-dev \
                      "$WEBKIT_PKG" \
                      "$APPINDICATOR_PKG" \
                      librsvg2-dev \
                      patchelf

            - name: Install npm dependencies
              run: npm ci

            - name: Build Tauri app and publish draft Release
              uses: tauri-apps/tauri-action@v0
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  tagName: ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}', github.run_number) }}
                  releaseName: ${{ github.ref_type == 'tag' && format('SatsFort {0}', github.ref_name) || format('SatsFort manual build {0}', github.run_number) }}
                  releaseDraft: true
                  prerelease: false
                  args: ${{ matrix.args }}
